# Serve ONLY the rolemrc resources server (the /verify scorer), for driving
# from nemo-evaluator via the gym:// environment adapter:
#
#   ng_run "+config_paths=[resources_servers/rolemrc/configs/rolemrc_serve.yaml]"
#
# Reference mode needs no model server — verify() computes ROUGE/BLEU/METEOR/
# BERTScore locally. nemo-evaluator owns the policy model and generation; it
# POSTs the model's answer to this server's /verify. See README.md.
rolemrc:
  resources_servers:
    rolemrc:
      entrypoint: app.py
      host: 0.0.0.0
      port: 8001
      domain: instruction_following
      verified: false
      description: RoleMRC reference-metric scorer (ROUGE/BLEU/METEOR/BERTScore); ROUGE-L is the reward.
      value: Improve role-play instruction following and knowledge-grounded responses.
      mode: reference
      include_bertscore: true
