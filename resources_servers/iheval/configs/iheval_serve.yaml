# Serve-only config: brings up JUST the IHEval resources server (scorer).
#
# All IHEval scorers are rule-based (F1 / ROUGE / IFEval / TensorTrust), so the
# verify() path needs no model — unlike rolemrc's judge mode. This config is
# used by the nemo-evaluator `gym://...protocol=native` flow, where the eval
# driver owns generation and only calls the resources server's /verify.
iheval:
  resources_servers:
    iheval:
      entrypoint: app.py
      domain: instruction_following
      verified: false
      description: IHEval instruction-hierarchy benchmark (task execution, safety, tool use, rule following) scored with the upstream rule-based checkers.
      value: Improve instruction-hierarchy following across aligned/conflict/reference settings, including native tool-use trajectories.
